name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  # pull_request:
  #   branches:
  #     - main
  #     - develop

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
    # GitHub は 2026/6 から Node.js 24 をデフォルトにする予定なので
    # actions/checkout・actions/setup-node 等は適宜バージョンアップしてください。
    # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 環境変数で先行切り替えも可能。

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # SonarCloud用：完全な履歴を取得

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # バックエンド分析
      - name: Install server dependencies
        working-directory: ./server
        run: |
          npm ci
          # npm ci sometimes skips optional native binaries due to an npm bug;
          # Vitest pulls in rollup which depends on @rollup/rollup-<platform>.
          # re-run npm install to fetch the missing package or explicitly add it.
          npm install @rollup/rollup-linux-x64-gnu || true

      - name: Build server
        working-directory: ./server
        run: npm run build --if-present

      - name: Run server tests with coverage
        working-directory: ./server
        run: npm run coverage:ci
        continue-on-error: true

      # フロントエンド分析
      - name: Install client dependencies
        working-directory: ./client
        # npm_config_os/cpu でCI環境（linux/x64）向けパッケージのみをインストール
        # Vite7のrollupがplatform-specificなoptionalパッケージを宣言するためdarwin-arm64が混入しないよう制御
        env:
          npm_config_os: linux
          npm_config_cpu: x64
        run: npm install

      - name: Build client
        working-directory: ./client
        run: npm run build --if-present

      # SonarCloud スキャン
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
