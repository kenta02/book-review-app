name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  # pull_request:
  #   branches:
  #     - main
  #     - develop

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]
    # GitHub は 2026/6 から Node.js 24 をデフォルトにする予定なので
    # actions/checkout・actions/setup-node 等は適宜バージョンアップしてください。
    # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 環境変数で先行切り替えも可能。

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarCloud用：完全な履歴を取得

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # バックエンド分析
      - name: Install server dependencies
        working-directory: ./server
        run: |
          npm ci
          # npm ci sometimes skips optional native binaries due to an npm bug;
          # Vitest pulls in rollup which depends on @rollup/rollup-<platform>.
          # re-run npm install to fetch the missing package or explicitly add it.
          npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0 || true

      - name: Build server
        working-directory: ./server
        run: npm run build --if-present

      - name: Run server tests with coverage
        working-directory: ./server
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASS: test_pass
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          JWT_SECRET: test-jwt-secret
        run: npm run coverage:ci

      # フロントエンド分析
      - name: Install client dependencies
        working-directory: ./client
        # npm_config_os/cpu でCI環境（linux/x64）向けパッケージのみをインストール
        # Vite7のrollupがplatform-specificなoptionalパッケージを宣言するためdarwin-arm64が混入しないよう制御
        env:
          npm_config_os: linux
          npm_config_cpu: x64
        run: npm install

      - name: Build client
        working-directory: ./client
        run: npm run build --if-present

      # SonarCloud スキャン
      - name: SonarCloud Scan
        # sonarcloud-github-action は廃止済みのため、公式後継へ移行
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
