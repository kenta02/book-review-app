name: CI

# このワークフローは push と pull_request に反応し、
# メインの開発ブランチ（main/develop）で実行されます。
# テスト、lint、型チェックを両方のパッケージ（server/client）に対して行います。

# run on push and pull request for primary development branches
# （プッシュとプルリクエスト時に動作）

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      # リポジトリのソースをチェックアウトします
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # GitHub Actions で Node.js のバージョンをセットアップします
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # ----- backend -----
      # サーバーサイド（./server）に対するステップ

      # サーバー依存パッケージをインストールします
      - name: Install server dependencies
        working-directory: ./server
        run: |
          npm ci
          # rolldown optional dependency bug workaround: align with installed rolldown version
          npm install --no-save @rolldown/binding-linux-x64-gnu@1.0.0-rc.12 || true

      # サーバーコードに対して ESLint を実行します
      - name: Lint server
        working-directory: ./server
        run: npm run lint

      # サーバーコードの TypeScript 型チェックを実行します
      - name: Type‑check server
        working-directory: ./server
        run: npm run check-types

      # サーバーのユニットテストとカバレッジ測定を実行します
      - name: Run server unit tests
        working-directory: ./server
        run: |
          mkdir -p coverage/.tmp
          npm run test:ci-parity

      # ----- frontend -----
      # クライアントサイド（./client）に対するステップ

      # クライアント依存パッケージをインストールします
      - name: Install client dependencies
        working-directory: ./client
        env:
          npm_config_os: linux
          npm_config_cpu: x64
        run: npm ci

      # クライアントコードに対して ESLint を実行します
      - name: Lint client
        working-directory: ./client
        run: npm run lint

      # クライアントのユニットテストとカバレッジ測定を実行します
      - name: Run client unit tests with coverage
        working-directory: ./client
        run: npx vitest --run --coverage

      # クライアントの TypeScript 型チェックを実行します
      - name: Type‑check client
        working-directory: ./client
        run: npx tsc --noEmit
