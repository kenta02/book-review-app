name: Copilot PR Review

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 差分比較のためにフル履歴を取得

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install GitHub Copilot CLI
        # npm パッケージ @github/copilot は存在しない
        # 正しくは gh 拡張として提供されている
        env:
          # GitHub Actions では `github.token` が常に利用可能なので、
          # COPILOT_GITHUB_TOKEN が未設定でもインストール自体は通す。
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-copilot

      - name: Run Copilot Review
        if: ${{ !github.event.pull_request.head.repo.fork && env.COPILOT_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.COPILOT_GITHUB_TOKEN }}
          GH_COPILOT_NO_INTERACTIVE: "1"
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff

          {
            echo "## Copilot Review"
            gh copilot explain < pr.diff
          } > copilot-review-comment.md

      - name: Post or update Copilot Review
        if: ${{ !github.event.pull_request.head.repo.fork && env.COPILOT_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_ID=$(
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --jq '.[] | select(.user.type == "Bot" and (.body | startswith("## Copilot Review"))) | .id' \
              | head -n 1
          )

          if [ -n "$COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              --field body="$(cat copilot-review-comment.md)"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body-file copilot-review-comment.md
          fi
