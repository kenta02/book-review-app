name: Copilot PR Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 差分比較のためにフル履歴を取得

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install GitHub Copilot CLI
        # npm パッケージ @github/copilot は存在しない
        # 正しくは gh 拡張として提供されている
        env:
          # GitHub Actions では `github.token` が常に利用可能なので、
          # COPILOT_GITHUB_TOKEN が未設定でもインストール自体は通す。
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-copilot

      - name: Run Copilot Review
        if: ${{ !github.event.pull_request.head.repo.fork && env.COPILOT_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.COPILOT_GITHUB_TOKEN }}
          GH_COPILOT_NO_INTERACTIVE: "1"
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }})
          {
            echo "## Copilot Review"
            gh copilot explain "$DIFF"
          } > copilot-review-comment.md

      - name: Post Copilot Review
        if: ${{ !github.event.pull_request.head.repo.fork && env.COPILOT_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file copilot-review-comment.md
