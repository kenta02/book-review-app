name: SonarCloud Issues Sync

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["SonarCloud Analysis"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  sync-issues:
    # SonarCloud 分析成功時、または手動実行時のみ動かす
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run では完了したワークフローの head_sha を対象にする
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run SonarCloud Issues Sync
        run: node scripts/sync-sonarcloud-issues.js
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GH_REPO: ${{ github.repository }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ SonarCloud Issues Sync failed: see workflow logs"
          # workflow_run トリガーでは context.issue が存在しないため
          # GitHub API 経由でコメントを付けようとすると 404 になる。
          # 必要ならここで Slack 等外部通知を呼ぶ。
