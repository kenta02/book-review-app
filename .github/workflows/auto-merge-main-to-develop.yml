name: Sync main → develop (create PR)

# main への push 時に develop への同期用 PR を自動作成します。
# コンフリクトがある場合は PR が作成されるので手動でマージしてください。
# PR がすでに存在する場合は何もしません。

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-main-to-develop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Merge main into develop (local)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit || true

      - name: Create sync PR (main → develop)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          branch: sync/main-to-develop
          title: "Sync main → develop"
          body: |
            main への変更を develop に取り込みます。

            コンフリクトがある場合はこの PR を手動でマージしてください。
          labels: sync
          delete-branch: true
