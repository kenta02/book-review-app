openapi: 3.0.3
info:
  title: Book Review App API
  description: |
    書籍レビューアプリケーションのREST API仕様

    🔐 認証について：
    - 保護されたエンドポイント（🔒マーク）には Authorization ヘッダーが必要です
    - Format: `Authorization: Bearer <JWT_TOKEN>`
  version: 1.0.0
  contact:
    name: Book Review App
  license:
    name: ISC

servers:
  - url: http://localhost:3000/api
    description: ローカル開発環境

tags:
  - name: Auth
    description: 認証関連
  - name: Books
    description: 書籍管理
  - name: Reviews
    description: レビュー管理
  - name: Comments
    description: コメント管理

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT認証トークン

        **使用法:** Swagger UI の Authorize ダイアログには **トークン本体のみ** を貼り付けてください（先頭に `Bearer ` を付ける必要はありません）。
        もし `Bearer ` を含めてしまうと `Bearer Bearer ...` となり認証に失敗します。

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: tanaka
        email:
          type: string
          format: email
          example: tanaka@example.com
        role:
          type: string
          enum: [user, admin]
          example: user

    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 吾輩は猫である
        author:
          type: string
          example: 夏目漱石
        publicationYear:
          type: integer
          example: 1905
        ISBN:
          type: string
          example: 9784101010014
        summary:
          type: string
        averageRating:
          type: number
          format: float
          example: 4.2
        reviewCount:
          type: integer
          example: 15
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        userId:
          type: integer
          nullable: true
        content:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
        reviewId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        content:
          type: string
        parentId:
          type: integer
          nullable: true
          description: リプライの場合の親コメントID
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        currentPage:
          type: integer
        totalPages:
          type: integer
        totalItems:
          type: integer
        itemsPerPage:
          type: integer

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
            details:
              type: array
              description: '（省略可能）バリデーションエラー等の詳細配列（{ field, message }）'
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

paths:
  /auth/register:
    post:
      summary: ユーザー登録
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 150
                  example: tanaka
                email:
                  type: string
                  format: email
                  example: tanaka@example.com
                password:
                  type: string
                  minLength: 8
                  example: password123
      responses:
        '201':
          description: ユーザー登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: ユーザー名またはメール既存
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: ユーザーログイン
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: tanaka@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      summary: 現在のユーザー情報取得
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: ユーザー情報取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books:
    get:
      summary: 書籍一覧取得
      tags: [Books]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 書籍一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      books:
                        type: array
                        items:
                          $ref: '#/components/schemas/Book'
                      pagination:
                        $ref: '#/components/schemas/Pagination'

    post:
      summary: 書籍追加
      tags: [Books]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - author
              properties:
                title:
                  type: string
                author:
                  type: string
                publicationYear:
                  type: integer
                ISBN:
                  type: string
                summary:
                  type: string
      responses:
        '201':
          description: 書籍追加成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Book'
        '400':
          description: バリデーションエラー
        '409':
          description: ISBN既存

  /books/{id}:
    get:
      summary: 書籍詳細取得
      tags: [Books]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 書籍詳細取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Book'
        '404':
          description: 書籍が見つからない

    put:
      summary: 書籍更新（部分更新対応）
      tags: [Books]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                publicationYear:
                  type: integer
                ISBN:
                  type: string
                summary:
                  type: string
      responses:
        '200':
          description: 書籍更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Book'
        '400':
          description: バリデーションエラー
        '404':
          description: 書籍が見つからない
        '409':
          description: 重複ISBN

    delete:
      summary: 書籍削除
      tags: [Books]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 書籍削除成功（ボディなし）
        '404':
          description: 書籍が見つからない
        '409':
          description: 関連データが存在するため削除不可

  /books/{bookId}/reviews:
    get:
      summary: 特定書籍のレビュー一覧取得
      tags: [Reviews]
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
          description: 書籍ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: ページ番号（1以上）
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: 1ページあたり件数（1〜100）
      responses:
        '200':
          description: レビュー一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      reviews:
                        type: array
                        items:
                          $ref: '#/components/schemas/Review'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '400':
          description: バリデーションエラー（無効な bookId）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 書籍が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews:
    get:
      summary: レビュー一覧取得
      tags: [Reviews]
      parameters:
        - name: bookId
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: レビュー一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      reviews:
                        type: array
                        items:
                          $ref: '#/components/schemas/Review'
                      pagination:
                        $ref: '#/components/schemas/Pagination'

    post:
      summary: レビュー投稿
      tags: [Reviews]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bookId
                - content
              properties:
                bookId:
                  type: integer
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
      responses:
        '201':
          description: レビュー投稿成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Review'
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 書籍が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews/{reviewId}:
    get:
      summary: レビュー詳細取得
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: レビュー詳細取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      bookId:
                        type: integer
                      bookTitle:
                        type: string
                      userId:
                        type: integer
                      username:
                        type: string
                      content:
                        type: string
                      rating:
                        type: integer
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time

    put:
      summary: レビュー更新
      tags: [Reviews]
      security:
        - BearerAuth: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: レビュー更新成功（更新後のレビューオブジェクトを返却）
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Review'
              examples:
                success:
                  summary: Updated review example
                  value:
                    success: true
                    data:
                      id: 7
                      bookId: 12
                      userId: 2
                      username: tanaka
                      content: '更新されたレビュー本文'
                      rating: 4
                      createdAt: '2026-02-10T12:00:00Z'
                      updatedAt: '2026-02-14T12:00:00Z'
        '400':
          description: バリデーションエラー（無効な reviewId や content）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: レビューが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: レビュー削除
      tags: [Reviews]
      security:
        - BearerAuth: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 'レビューID（整数、1以上）。小数や0以下は 400 を返します。'
      responses:
        '204':
          description: レビュー削除成功（No Content）
        '400':
          description: 無効な reviewId（非整数・0以下・不正値）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足（他人のレビューを削除しようとした）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 指定したレビューが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 関連コメントが存在するため削除不可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews/{reviewId}/comments:
    post:
      summary: コメント投稿（特定レビュー）
      tags: [Comments]
      security:
        - BearerAuth: []
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                parentId:
                  type: integer
                  nullable: true
                  description: リプライの場合、親コメントID
      responses:
        '201':
          description: コメント投稿成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Comment'
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: レビューが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: 特定レビューのコメント一覧取得
      tags: [Comments]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: コメント一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      comments:
                        type: array
                        items:
                          $ref: '#/components/schemas/Comment'
        '404':
          description: レビューが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
